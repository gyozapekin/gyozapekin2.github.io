// アコーディオンを開いたとき初めて写真を読み込む
function loadGallery(quarter) {
  var grid = document.getElementById('grid-' + quarter);
  if (grid.dataset.loaded) return;
  grid.dataset.loaded = '1';
  var imgs = galleryData[quarter] || [];
  var html = '';
  imgs.forEach(function(src) {
    html += '<img src="' + src + '" loading="lazy" alt="' + quarter + '" onclick="openModal(\'' + src + '\')">';
  });
  grid.innerHTML = html;
}

function toggleAccordion(btn) {
  var item = btn.parentElement;
  var wasOpen = item.classList.contains('open');
  // 他を全部閉じる
  document.querySelectorAll('.accordion-item').forEach(function(el) {
    el.classList.remove('open');
  });
  if (!wasOpen) {
    item.classList.add('open');
    loadGallery(item.dataset.quarter);
  }
}

// 最初から開いているものを読み込む
document.querySelectorAll('.accordion-item.open').forEach(function(item) {
  loadGallery(item.dataset.quarter);
});

function openModal(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('lightbox-modal').style.display = 'none';
  document.getElementById('lightbox-img').src = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
</script>
