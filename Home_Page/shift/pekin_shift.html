<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>海鮮餃子ペキン 勤務表</title>
<style>
:root {
  --red:    #c0392b;
  --blue:   #2471a3;
  --amber:  #d68910;
  --green:  #1e8449;
  --bg:     #f0f2f5;
  --card:   #ffffff;
  --border: #e2e8f0;
  --text:   #1a202c;
  --muted:  #718096;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue','Hiragino Sans','Yu Gothic UI',Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── MODE BAR ── */
.mode-bar {
  background:#1a202c; display:flex; align-items:center; gap:0;
  padding:0 28px; border-bottom:2px solid #2d3748;
}
.mode-tab {
  padding:10px 22px; font-size:.82em; font-weight:700;
  color:#a0aec0; cursor:pointer; border:none; background:none;
  letter-spacing:.05em; border-bottom:3px solid transparent;
  transition:all .15s;
}
.mode-tab.active { color:#fff; border-bottom-color:var(--red); }
.mode-tab:hover:not(.active) { color:#e2e8f0; }

/* ── HEADER ── */
.header {
  color:#fff; padding:14px 28px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
}
.header.mode-admin  { background:linear-gradient(135deg,#a93226,#c0392b,#e74c3c); }
.header.mode-staff  { background:linear-gradient(135deg,#145a8c,#1a6da0,#2471a3); }
.header.mode-request{ background:linear-gradient(135deg,#1a6834,#1e8449,#27ae60); }

.header-left { display:flex; align-items:center; gap:14px; }
.header-logo { font-size:1.8em; line-height:1; }
.header-title h1 { font-size:1.15em; font-weight:700; letter-spacing:.06em; }
.header-title p  { font-size:.72em; opacity:.8; margin-top:2px; }
.header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

.month-nav { display:flex; align-items:center; background:rgba(255,255,255,.15); border-radius:8px; overflow:hidden; }
.month-nav button { background:none;border:none;color:#fff;padding:7px 14px;cursor:pointer;font-size:1em;transition:background .15s; }
.month-nav button:hover { background:rgba(255,255,255,.25); }
.month-label { font-size:1em;font-weight:700;padding:7px 16px;min-width:120px;text-align:center;
  border-left:1px solid rgba(255,255,255,.2); border-right:1px solid rgba(255,255,255,.2); }
.hbtn { border:none;border-radius:6px;padding:7px 14px;font-size:.8em;font-weight:600;cursor:pointer;transition:opacity .15s; }
.hbtn:hover { opacity:.85; }
.hbtn-ghost { background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35); }
.hbtn-green { background:#27ae60;color:#fff; }
.hbtn-amber { background:#e67e22;color:#fff; }

/* ── LEGEND / INFO BAR ── */
.info-bar { display:flex;gap:16px;align-items:center;padding:9px 28px;background:#fff;
  border-bottom:1px solid var(--border);font-size:.78em;color:var(--muted);flex-wrap:wrap; }
.leg { display:flex;align-items:center;gap:5px; }
.leg-dot { width:11px;height:11px;border-radius:3px; }
.ld-lunch  { background:#dbeafe;border:1.5px solid #93c5fd; }
.ld-dinner { background:#fef3c7;border:1.5px solid #fcd34d; }
.ld-closed { background:#e5e7eb;border:1.5px solid #d1d5db; }
.ld-off    { background:#fee2e2;border:1.5px solid #fca5a5; }
.ld-ok     { background:#d1fae5;border:1.5px solid #6ee7b7; }
.ld-maybe  { background:#fef9c3;border:1.5px solid #fde047; }

/* ── STAFF SELECTOR (request mode) ── */
.staff-selector-bar {
  background:#f8fafc;border-bottom:1px solid var(--border);
  padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.staff-selector-bar label { font-size:.82em;font-weight:700;color:#475569; }
.staff-select {
  border:1.5px solid var(--border);border-radius:7px;padding:6px 12px;
  font-size:.88em;outline:none;min-width:160px;
  transition:border-color .12s;
}
.staff-select:focus { border-color:#94a3b8; }
.req-status-badge { font-size:.78em;padding:4px 10px;border-radius:12px;font-weight:600; }
.badge-open   { background:#d1fae5;color:#065f46; }
.badge-closed { background:#fee2e2;color:#991b1b; }
.deadline-info { font-size:.78em;color:#64748b;margin-left:auto; }

/* ── CALENDAR WRAP ── */
.cal-wrap { padding:16px 24px;max-width:1280px;margin:0 auto; }
.cal-head { display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px; }
.cal-head-cell { text-align:center;font-size:.78em;font-weight:700;padding:6px 0;
  color:var(--muted);letter-spacing:.08em;text-transform:uppercase; }
.cal-head-cell.sun { color:var(--red); }
.cal-head-cell.sat { color:var(--blue); }
.cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px; }

/* ── DAY CELL ── */
.day-cell {
  background:var(--card);border-radius:10px;border:1px solid var(--border);
  min-height:140px;padding:8px;display:flex;flex-direction:column;gap:4px;
  transition:box-shadow .15s;position:relative;
}
.day-cell:not(.closed):not(.other-month):hover { box-shadow:0 2px 12px rgba(0,0,0,.1); }
.day-cell.other-month { opacity:.3;pointer-events:none; }
.day-cell.closed { background:#f1f3f5;border-color:#e2e6ea; }
.day-cell.futeikyu { background:#fefce8;border-color:#fde68a; }
.day-cell.today  { border:2px solid var(--red); }

.day-num { font-size:1.05em;font-weight:700;width:28px;height:28px;display:flex;
  align-items:center;justify-content:center;border-radius:50%;align-self:flex-end; }
.day-cell.sun .day-num { color:var(--red); }
.day-cell.sat .day-num { color:var(--blue); }
.day-cell.today .day-num { background:var(--red);color:#fff; }
.closed-label { flex:1;display:flex;align-items:center;justify-content:center;
  font-size:.75em;color:#adb5bd;letter-spacing:.15em;font-weight:500; }
.futeikyu-label { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  font-size:.72em;color:#a16207;letter-spacing:.1em;font-weight:500; }
.wed-toggle-btn { font-size:.68em;padding:3px 9px;border-radius:12px;border:1px solid #a16207;
  background:#fef9c3;color:#a16207;cursor:pointer;font-weight:600;white-space:nowrap;
  transition:background .15s; }
.wed-toggle-btn:hover { background:#fde68a; }
.wed-close-btn { font-size:.62em;padding:2px 7px;border-radius:10px;border:1px solid #d1d5db;
  background:#f3f4f6;color:#6b7280;cursor:pointer;font-weight:500;align-self:flex-end;
  transition:background .15s;margin-top:2px; }
.wed-close-btn:hover { background:#e5e7eb; }

/* ── SHIFT BLOCKS (admin view) ── */
.shift-block { border-radius:7px;padding:5px 7px;cursor:pointer;transition:filter .12s;flex:1; }
.shift-block:hover { filter:brightness(.95); }
.shift-block.lunch  { background:#eff6ff;border:1px solid #bfdbfe; }
.shift-block.dinner { background:#fffbeb;border:1px solid #fde68a; }
.shift-label { font-size:.62em;font-weight:700;letter-spacing:.05em;margin-bottom:3px;display:flex;align-items:center;gap:3px; }
.shift-block.lunch  .shift-label { color:#1d4ed8; }
.shift-block.dinner .shift-label { color:#92400e; }
.shift-names-row { display:flex;flex-wrap:wrap;gap:3px;min-height:18px; }
.name-tag { font-size:.72em;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap; }
.lunch  .name-tag { background:#dbeafe;color:#1e40af;border:1px solid #93c5fd; }
.dinner .name-tag { background:#fef3c7;color:#92400e;border:1px solid #fcd34d; }
.name-empty { font-size:.72em;color:#aaa; }
.ext-tag { font-size:.62em;background:#fee2e2;color:#b91c1c;border-radius:3px;padding:1px 4px;font-weight:700; }

/* ── AVAILABILITY DOTS (admin view overlay) ── */
.avail-row { display:flex;flex-wrap:wrap;gap:2px;margin-top:2px; }
.avail-dot { width:7px;height:7px;border-radius:50%;cursor:default; }
.avail-dot[title]:hover::after {
  content:attr(title); position:absolute; background:#1a202c; color:#fff;
  font-size:.65em; padding:2px 6px; border-radius:4px; white-space:nowrap;
  top:-22px; left:0; z-index:10; pointer-events:none;
}
.dot-ok    { background:#10b981; }
.dot-off   { background:#ef4444; }
.dot-maybe { background:#f59e0b; }

/* ── REQUEST MODE: availability picker per day ── */
.avail-pick-area { display:flex;flex-direction:column;gap:3px;flex:1; }
.avail-pick-label { font-size:.62em;color:var(--muted);font-weight:600;letter-spacing:.04em; }
.avail-btns { display:flex;gap:3px; }
.avail-btn {
  flex:1;border:1.5px solid #e2e8f0;border-radius:5px;
  font-size:.72em;font-weight:700;padding:4px 2px;cursor:pointer;
  background:#f8fafc;color:#94a3b8;transition:all .12s;text-align:center;
}
.avail-btn.sel-ok    { background:#d1fae5;border-color:#34d399;color:#065f46; }
.avail-btn.sel-off   { background:#fee2e2;border-color:#fca5a5;color:#991b1b; }
.avail-btn.sel-maybe { background:#fef9c3;border-color:#fde047;color:#854d0e; }
.avail-btn:hover { opacity:.8; }

/* ── STAFF VIEW: read-only shift display ── */
.staff-shift-block { border-radius:7px;padding:5px 7px;flex:1;margin-top:2px; }
.staff-shift-block.lunch  { background:#eff6ff;border:1px solid #bfdbfe; }
.staff-shift-block.dinner { background:#fffbeb;border:1px solid #fde68a; }
.my-shift-badge {
  display:inline-block;font-size:.7em;font-weight:800;
  padding:2px 7px;border-radius:12px;margin-top:2px;
}
.my-shift-badge.lunch-badge  { background:#1d4ed8;color:#fff; }
.my-shift-badge.dinner-badge { background:#92400e;color:#fff; }

/* ── SUMMARY TABLE (admin: request overview) ── */
.summary-wrap { padding:16px 24px;max-width:1280px;margin:0 auto; }
.summary-card { background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px; }
.summary-card-head { background:#2c3e50;color:#fff;padding:12px 18px;font-size:.88em;font-weight:700; }
.summary-table { width:100%;border-collapse:collapse; }
.summary-table th { background:#f1f5f9;padding:8px 12px;font-size:.78em;font-weight:700;color:#475569;border-bottom:1px solid var(--border); }
.summary-table td { padding:8px 12px;font-size:.82em;border-bottom:1px solid #f1f5f9;vertical-align:middle; }
.summary-table tr:last-child td { border-bottom:none; }
.avail-cell { display:flex;flex-wrap:wrap;gap:3px; }
.atag { font-size:.72em;padding:1px 7px;border-radius:10px;font-weight:600; }
.atag-ok    { background:#d1fae5;color:#065f46; }
.atag-off   { background:#fee2e2;color:#991b1b; }
.atag-maybe { background:#fef9c3;color:#854d0e; }

/* ── MODALS ── */
.overlay { position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:300;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px); }
.overlay.open { display:flex; }
.modal { background:#fff;border-radius:14px;padding:24px;width:360px;max-width:96vw;
  box-shadow:0 20px 60px rgba(0,0,0,.2);animation:pop .18s ease; }
@keyframes pop { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
.modal-sub  { font-size:.78em;color:var(--muted);margin-bottom:3px; }
.modal-head { font-size:1em;font-weight:700;margin-bottom:16px; }
.modal-sect { margin-bottom:16px; }
.sect-label { font-size:.72em;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:block;margin-bottom:8px; }
.chips-grid { display:flex;flex-wrap:wrap;gap:7px; }
.staff-chip { display:flex;align-items:center;gap:5px;border:1.5px solid var(--border);
  border-radius:20px;padding:5px 12px;cursor:pointer;font-size:.83em;font-weight:500;
  transition:all .12s;user-select:none; }
.staff-chip:hover { border-color:#94a3b8;background:#f8fafc; }
.staff-chip.selected-lunch  { border-color:#3b82f6;background:#eff6ff;color:#1d4ed8; }
.staff-chip.selected-dinner { border-color:#f59e0b;background:#fffbeb;color:#92400e; }
.staff-chip input { display:none; }
.ext-row { display:flex;align-items:center;gap:8px;font-size:.85em;cursor:pointer; }
.ext-row input { cursor:pointer;width:15px;height:15px; }
.modal-actions { display:flex;gap:8px;justify-content:flex-end;margin-top:20px; }
.mbtn { border:none;border-radius:7px;padding:8px 18px;font-size:.85em;font-weight:600;cursor:pointer; }
.mbtn-cancel { background:#f1f5f9;color:#475569; }
.mbtn-save   { background:var(--red);color:#fff; }
.mbtn:hover  { opacity:.88; }

/* Staff modal */
.staff-modal { width:420px; }
.srow { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
.sbadge { font-size:.68em;padding:2px 7px;border-radius:10px;font-weight:600; }
.sb-part  { background:#dbeafe;color:#1d4ed8; }
.sb-fixed { background:#d1fae5;color:#065f46; }
.sb-free  { background:#fef3c7;color:#92400e; }
.sb-alt   { background:#f3e8ff;color:#6b21a8; }
.srow input { flex:1;border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.88em;outline:none;transition:border-color .12s; }
.srow input:focus { border-color:#94a3b8; }
.srow input:disabled { background:#f8fafc;color:#aaa; }

/* Confirm submit modal */
.confirm-modal { width:380px; }
.confirm-list { background:#f8fafc;border-radius:8px;padding:12px 16px;margin:12px 0;max-height:200px;overflow-y:auto; }
.confirm-list li { font-size:.82em;padding:3px 0;border-bottom:1px solid #e2e8f0;list-style:none;display:flex;align-items:center;gap:6px; }

/* PRINT */
@media print {
  body { background:#fff; }
  .no-print { display:none!important; }
  .mode-bar  { display:none!important; }
  .info-bar  { display:none!important; }
  .staff-selector-bar { display:none!important; }
  .header { -webkit-print-color-adjust:exact;print-color-adjust:exact;padding:10px 18px; }
  .cal-wrap { padding:8px; }
  .day-cell { min-height:100px;page-break-inside:avoid; }
  .shift-block.lunch,.shift-block.dinner { -webkit-print-color-adjust:exact;print-color-adjust:exact; }
  .name-tag { -webkit-print-color-adjust:exact;print-color-adjust:exact; }
  .day-cell.closed { background:#f1f3f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact; }
  .overlay { display:none!important; }
}
</style>
</head>
<body>

<!-- MODE SWITCHER -->
<div class="mode-bar no-print">
  <button class="mode-tab active" id="tab-admin"   onclick="setMode('admin')">🔧 管理者モード</button>
  <button class="mode-tab"        id="tab-request" onclick="setMode('request')">📝 希望入力モード</button>
  <button class="mode-tab"        id="tab-staff"   onclick="setMode('staff')">👀 スタッフ確認モード</button>
</div>

<!-- HEADER -->
<div class="header mode-admin" id="mainHeader">
  <div class="header-left">
    <div class="header-logo">🥟</div>
    <div class="header-title">
      <h1 id="headerTitle">海鮮餃子ペキン　勤務表　管理</h1>
      <p  id="headerSub">ADMIN — STAFF SCHEDULE MANAGEMENT</p>
    </div>
  </div>
  <div class="header-right">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#9664;</button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)">&#9654;</button>
    </div>
    <button class="hbtn hbtn-ghost no-print" id="btnStaff"   onclick="openStaffModal()">👥 スタッフ</button>
    <button class="hbtn hbtn-ghost no-print" id="btnReset"   onclick="resetToDefault()">↺ リセット</button>
    <button class="hbtn hbtn-ghost no-print" id="btnSummary" onclick="toggleSummary()" style="display:none">📊 希望一覧</button>
    <button class="hbtn hbtn-green no-print" onclick="window.print()">🖨 印刷</button>
  </div>
</div>

<!-- INFO BAR -->
<div class="info-bar no-print" id="infoBar">
  <span style="font-weight:700;color:#374151;">凡例：</span>
  <span class="leg"><span class="leg-dot ld-lunch"></span>昼の部 11:00〜14:00</span>
  <span class="leg"><span class="leg-dot ld-dinner"></span>夜の部 18:00〜21:00</span>
  <span class="leg"><span class="leg-dot ld-closed"></span>定休日（火曜）</span>
  <span class="leg"><span class="leg-dot" style="background:#fde68a;border:1px solid #a16207;border-radius:3px;display:inline-block;width:12px;height:12px;"></span>不定休（水曜）</span>
  <span id="availLegend" style="display:none">
    <span class="leg"><span class="leg-dot ld-ok"></span>出勤可</span>
    <span class="leg"><span class="leg-dot ld-off"></span>休み希望</span>
    <span class="leg"><span class="leg-dot ld-maybe"></span>調整可</span>
  </span>
  <span style="margin-left:auto;font-size:.78em;" id="editHint">各シフト枠をクリックして編集</span>
</div>

<!-- STAFF SELECTOR (request mode only) -->
<div class="staff-selector-bar no-print" id="staffSelectorBar" style="display:none">
  <label for="reqStaffSelect">あなたの名前：</label>
  <select id="reqStaffSelect" class="staff-select" onchange="onStaffSelected()">
    <option value="">-- 選択してください --</option>
  </select>
  <span class="req-status-badge badge-open" id="reqStatusBadge">受付中</span>
  <span class="deadline-info" id="reqDeadlineInfo"></span>
</div>

<!-- MAIN CALENDAR -->
<div class="cal-wrap" id="calWrap">
  <div class="cal-head">
    <div class="cal-head-cell sun">日</div>
    <div class="cal-head-cell">月</div>
    <div class="cal-head-cell">火</div>
    <div class="cal-head-cell">水</div>
    <div class="cal-head-cell">木</div>
    <div class="cal-head-cell sat">金</div>
    <div class="cal-head-cell sat">土</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- SUMMARY VIEW (admin) -->
<div class="summary-wrap" id="summaryWrap" style="display:none"></div>

<!-- Edit Modal (admin) -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-head" id="modalHead"></div>
    <div class="modal-sect">
      <span class="sect-label">担当スタッフ（最大4名）</span>
      <div class="chips-grid" id="modalChips"></div>
    </div>
    <div class="modal-sect">
      <label class="ext-row"><input type="checkbox" id="extCheck"> 延長の可能性あり</label>
    </div>
    <div class="modal-actions">
      <button class="mbtn mbtn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="mbtn mbtn-save"   onclick="saveShift()">保存する</button>
    </div>
  </div>
</div>

<!-- Staff Modal -->
<div class="overlay" id="staffOverlay">
  <div class="modal staff-modal">
    <div class="modal-head">👥 スタッフ管理</div>
    <p style="font-size:.78em;color:var(--muted);margin-bottom:16px;">アルバイト欄は自由に編集できます。</p>
    <div id="staffRows"></div>
    <div class="modal-actions">
      <button class="mbtn mbtn-cancel" onclick="closeStaff()">キャンセル</button>
      <button class="mbtn mbtn-save"   onclick="saveStaff()">保存する</button>
    </div>
  </div>
</div>

<!-- Confirm Submit Modal (request mode) -->
<div class="overlay" id="confirmOverlay">
  <div class="modal confirm-modal">
    <div class="modal-head">✅ 希望を送信しますか？</div>
    <p style="font-size:.82em;color:#475569;margin-bottom:8px;" id="confirmName"></p>
    <ul class="confirm-list" id="confirmList"></ul>
    <p style="font-size:.75em;color:#94a3b8;margin-top:8px;">送信後も20日までは変更できます。</p>
    <div class="modal-actions">
      <button class="mbtn mbtn-cancel" onclick="closeConfirm()">戻る</button>
      <button class="mbtn" style="background:#27ae60;color:#fff;" onclick="submitRequest()">送信する</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   STAFF
============================================================ */
const STAFF_DEFAULTS = [
  {id:'fusa',name:'ふさちゃん',type:'part', editable:false},
  {id:'tsan',name:'Tさん',    type:'part', editable:false},
  {id:'asan',name:'Aさん',    type:'fixed',editable:false},
  {id:'bsan',name:'Bさん',    type:'fixed',editable:false},
  {id:'csan',name:'Cさん',    type:'free', editable:false},
  {id:'alt1',name:'',         type:'alt',  editable:true },
  {id:'alt2',name:'',         type:'alt',  editable:true },
];
let staff = JSON.parse(localStorage.getItem('pekin_staff')||'null')
          || JSON.parse(JSON.stringify(STAFF_DEFAULTS));
function sName(id){ return (staff.find(s=>s.id===id)||{}).name||''; }

/* ============================================================
   SHIFT DATA
============================================================ */
let Y = new Date().getFullYear(), M = new Date().getMonth();
let shiftData = {};
const shiftKey = ()=>`pekin_shift_${Y}-${String(M+1).padStart(2,'0')}`;
const dKey=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function loadShift(){
  const s=localStorage.getItem(shiftKey());
  shiftData = s?JSON.parse(s):buildDefault(Y,M);
  if(!s) saveShift2();
}
function saveShift2(){ localStorage.setItem(shiftKey(),JSON.stringify(shiftData)); }

function toggleWedOpen(k){
  if(!shiftData._openWed) shiftData._openWed=[];
  const idx=shiftData._openWed.indexOf(k);
  if(idx===-1){
    shiftData._openWed.push(k);
    // デフォルトシフト枠を初期化
    if(!shiftData[k]) shiftData[k]={lunch:{names:[],ext:false},dinner:{names:[],ext:false}};
  } else {
    shiftData._openWed.splice(idx,1);
    delete shiftData[k];
  }
  saveShift2();
  renderCalendar();
}

function buildDefault(y,m){
  const out={}, days=new Date(y,m+1,0).getDate();
  const openWed=shiftData._openWed||[];
  const LUNCH={0:'tsan',3:'tsan',4:'fusa',5:'fusa',6:'fusa'}; // py wd: Mon=0..Sun=6
  for(let d=1;d<=days;d++){
    const dow=new Date(y,m,d).getDay(); // 0=Sun
    const k=dKey(y,m,d);
    if(dow===2) continue;                         // 火曜：固定定休
    if(dow===3&&!openWed.includes(k)) continue;  // 水曜：開店済みでなければスキップ
    const pyWd={0:6,1:0,2:1,3:2,4:3,5:4,6:5}[dow];
    const lId=LUNCH[pyWd];
    const ln=lId?[sName(lId)].filter(Boolean):[];
    const dn=[sName('asan'),sName('bsan')].filter(Boolean);
    out[k]={lunch:{names:ln,ext:false},dinner:{names:dn,ext:false}};
  }
  return out;
}

/* ============================================================
   AVAILABILITY / REQUEST DATA
   stored: pekin_avail_YYYY-MM → { staffId: { dateKey: 'ok'|'off'|'maybe' } }
============================================================ */
const availKey=(y,m)=>`pekin_avail_${y}-${String(m+1).padStart(2,'0')}`;
function loadAvail(y,m){
  return JSON.parse(localStorage.getItem(availKey(y,m))||'{}');
}
function saveAvail(y,m,data){
  localStorage.setItem(availKey(y,m),JSON.stringify(data));
}

/* Current request session */
let reqStaffId = '';
let reqAvailData = {};   // working copy for current staff
let allAvail = {};       // full avail object for the month

/* ============================================================
   MODE
============================================================ */
let mode = 'admin';
const MODES = {
  admin:  {hClass:'mode-admin',  title:'海鮮餃子ペキン　勤務表　管理',    sub:'ADMIN — STAFF SCHEDULE MANAGEMENT'},
  request:{hClass:'mode-staff',  title:'希望休　入力フォーム',            sub:'STAFF AVAILABILITY REQUEST'},
  staff:  {hClass:'mode-request',title:'海鮮餃子ペキン　シフト表',        sub:'STAFF VIEW — READ ONLY'},
};

function setMode(m){
  mode=m;
  ['admin','request','staff'].forEach(id=>{
    document.getElementById('tab-'+id).classList.toggle('active',id===m);
  });
  const hdr=document.getElementById('mainHeader');
  hdr.className='header '+MODES[m].hClass;
  document.getElementById('headerTitle').textContent=MODES[m].title;
  document.getElementById('headerSub').textContent=MODES[m].sub;

  const isAdmin=m==='admin';
  const isReq  =m==='request';
  document.getElementById('btnStaff')  .style.display=isAdmin?'':'none';
  document.getElementById('btnReset')  .style.display=isAdmin?'':'none';
  document.getElementById('btnSummary').style.display=isAdmin?'':'none';
  document.getElementById('staffSelectorBar').style.display=isReq?'flex':'none';
  document.getElementById('availLegend').style.display=(isAdmin||isReq)?'':'none';
  document.getElementById('editHint').textContent=
    isAdmin?'各シフト枠をクリックして編集':
    isReq  ?'日付をクリックして希望を入力':'シフト確認のみ（編集不可）';

  if(isReq) setupReqMode();
  if(isAdmin) allAvail = loadAvail(Y,M);
  hideSummary();
  render();
}

/* ============================================================
   REQUEST MODE HELPERS
============================================================ */
function setupReqMode(){
  // populate staff select
  const sel=document.getElementById('reqStaffSelect');
  sel.innerHTML='<option value="">-- 選択してください --</option>';
  staff.filter(s=>s.name.trim()).forEach(s=>{
    const o=document.createElement('option');
    o.value=s.id; o.textContent=s.name;
    sel.appendChild(o);
  });
  // deadline: 20th of current month for next month
  const now=new Date();
  const tgt = new Date(now.getFullYear(), now.getMonth()+1, 1); // next month
  document.getElementById('reqDeadlineInfo').textContent=
    `${now.getMonth()+1}月20日までに入力してください（対象：${tgt.getMonth()+1}月分）`;

  // check if past deadline
  const deadline=new Date(now.getFullYear(),now.getMonth(),20,23,59,59);
  const closed=now>deadline;
  const badge=document.getElementById('reqStatusBadge');
  badge.textContent=closed?'受付終了':'受付中';
  badge.className='req-status-badge '+(closed?'badge-closed':'badge-open');
}

function onStaffSelected(){
  reqStaffId=document.getElementById('reqStaffSelect').value;
  allAvail=loadAvail(Y,M);
  reqAvailData=reqStaffId?(allAvail[reqStaffId]||{}):{};
  render();
}

function cycleAvail(dateKey){
  if(!reqStaffId){alert('先に名前を選択してください。');return;}
  const cur=reqAvailData[dateKey]||'';
  const next={''  :'ok','ok':'off','off':'maybe','maybe':''}[cur]||'';
  if(next) reqAvailData[dateKey]=next;
  else     delete reqAvailData[dateKey];
  render();
}

function openConfirm(){
  if(!reqStaffId){alert('名前を選択してください。');return;}
  const sn=staff.find(s=>s.id===reqStaffId);
  document.getElementById('confirmName').textContent=(sn?sn.name:'')+'さんの希望内容';
  const list=document.getElementById('confirmList');
  list.innerHTML='';
  const entries=Object.entries(reqAvailData).sort(([a],[b])=>a.localeCompare(b));
  if(entries.length===0){
    list.innerHTML='<li style="color:#aaa">入力なし（全日出勤可）</li>';
  } else {
    entries.forEach(([k,v])=>{
      const [,m2,d]=k.split('-');
      const li=document.createElement('li');
      const icon=v==='ok'?'✅':v==='off'?'❌':'🔄';
      const label=v==='ok'?'出勤可':v==='off'?'休み希望':'調整可';
      li.innerHTML=`${icon} <strong>${parseInt(m2)}月${parseInt(d)}日</strong> — ${label}`;
      list.appendChild(li);
    });
  }
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');}

function submitRequest(){
  if(!reqStaffId) return;
  allAvail=loadAvail(Y,M);
  allAvail[reqStaffId]=reqAvailData;
  saveAvail(Y,M,allAvail);
  closeConfirm();
  alert(`${staff.find(s=>s.id===reqStaffId)?.name||''}さんの希望を保存しました！`);
  render();
}

/* ============================================================
   RENDER
============================================================ */
const DOW_STR=['日','月','火','水','木','金','土'];
const DOW_CLS=['sun','mon','tue','wed','thu','fri','sat'];

function render(){
  document.getElementById('monthLabel').textContent=`${Y}年 ${M+1}月`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  const firstDow=new Date(Y,M,1).getDay();
  const totalDays=new Date(Y,M+1,0).getDate();
  const prevTotal=new Date(Y,M,0).getDate();
  const today=new Date();

  for(let i=0;i<firstDow;i++)
    grid.appendChild(makeCell(Y,M-1,prevTotal-firstDow+i+1,true));
  for(let d=1;d<=totalDays;d++){
    const isToday=today.getFullYear()===Y&&today.getMonth()===M&&today.getDate()===d;
    grid.appendChild(makeCell(Y,M,d,false,isToday));
  }
  const filled=firstDow+totalDays;
  for(let i=1;i<=Math.ceil(filled/7)*7-filled;i++)
    grid.appendChild(makeCell(Y,M+1,i,true));
}

function makeCell(y,m,d,other,isToday){
  const dow=new Date(y,m,d).getDay();
  const k=dKey(y,m,d);
  const isTueClosed=(dow===2);              // 火曜：固定定休日
  const isWedBase=(dow===3);               // 水曜：不定休（デフォルト）
  const wedOpen=shiftData._openWed||[];
  const isWedOpen=isWedBase&&wedOpen.includes(k); // 水曜だが開店に切り替え済み
  const closed=isTueClosed||(isWedBase&&!isWedOpen);
  const entry=shiftData[k]||{lunch:{names:[],ext:false},dinner:{names:[],ext:false}};

  const cell=document.createElement('div');
  cell.className='day-cell '+DOW_CLS[dow]
    +(isTueClosed?' closed':'')+(isWedBase&&!isWedOpen?' futeikyu':'')
    +(other?' other-month':'')+(isToday?' today':'');

  const num=document.createElement('div');
  num.className='day-num';
  num.textContent=d;
  cell.appendChild(num);

  if(isTueClosed){
    const cl=document.createElement('div');
    cl.className='closed-label';cl.textContent='定 休 日';
    cell.appendChild(cl);
    return cell;
  }
  if(isWedBase&&!isWedOpen){
    const fl=document.createElement('div');
    fl.className='futeikyu-label';
    fl.innerHTML='不 定 休';
    if(mode==='admin'){
      const btn=document.createElement('button');
      btn.className='wed-toggle-btn';
      btn.textContent='この日を開ける';
      btn.onclick=(e)=>{ e.stopPropagation(); toggleWedOpen(k); };
      fl.appendChild(btn);
    }
    cell.appendChild(fl);
    return cell;
  }
  if(other) return cell;

  if(mode==='admin'){
    // shift blocks + availability dots
    cell.appendChild(shiftBlock(k,'lunch', entry.lunch, '☀ 昼の部'));
    cell.appendChild(shiftBlock(k,'dinner',entry.dinner,'🌙 夜の部'));
    const dots=availDotsRow(k);
    if(dots.childElementCount>0) cell.appendChild(dots);
    // 開店中の水曜：「休みに戻す」ボタン
    if(isWedOpen){
      const cbtn=document.createElement('button');
      cbtn.className='wed-close-btn';
      cbtn.textContent='水曜を休みに戻す';
      cbtn.onclick=(e)=>{ e.stopPropagation(); toggleWedOpen(k); };
      cell.appendChild(cbtn);
    }
  } else if(mode==='request'){
    cell.appendChild(availPickBlock(k,dow));
  } else {
    // staff view: show shift
    cell.appendChild(staffShiftBlock(k,'lunch', entry.lunch, '☀ 昼'));
    cell.appendChild(staffShiftBlock(k,'dinner',entry.dinner,'🌙 夜'));
  }
  return cell;
}

/* Admin: shift block */
function shiftBlock(k,type,se,label){
  const bl=document.createElement('div');
  bl.className=`shift-block ${type}`;
  bl.onclick=()=>openEdit(k,type);
  const lbl=document.createElement('div');
  lbl.className='shift-label';lbl.textContent=label;bl.appendChild(lbl);
  const row=document.createElement('div');
  row.className='shift-names-row';
  const names=(se.names||[]).filter(n=>n&&n.trim());
  if(names.length){
    names.forEach(n=>{const t=document.createElement('span');t.className='name-tag';t.textContent=n;row.appendChild(t);});
    if(se.ext){const e=document.createElement('span');e.className='ext-tag';e.textContent='延長';row.appendChild(e);}
  } else {
    const e=document.createElement('span');e.className='name-empty';e.textContent='未定';row.appendChild(e);
  }
  bl.appendChild(row);
  return bl;
}

/* Admin: availability dots */
function availDotsRow(dateKey){
  const row=document.createElement('div');
  row.className='avail-row';
  const avail=loadAvail(Y,M);
  staff.filter(s=>s.name).forEach(s=>{
    const v=avail[s.id]&&avail[s.id][dateKey];
    if(!v) return;
    const dot=document.createElement('span');
    dot.className=`avail-dot ${v==='ok'?'dot-ok':v==='off'?'dot-off':'dot-maybe'}`;
    dot.title=`${s.name}：${v==='ok'?'出勤可':v==='off'?'休み希望':'調整可'}`;
    row.appendChild(dot);
  });
  return row;
}

/* Request mode: availability pick */
function availPickBlock(k,dow){
  const wrap=document.createElement('div');
  wrap.className='avail-pick-area';
  const lbl=document.createElement('div');
  lbl.className='avail-pick-label';lbl.textContent='希望を選択';
  wrap.appendChild(lbl);

  const cur=reqStaffId?reqAvailData[k]||'':'';
  const btns=[
    {val:'ok',  label:'○ 出勤可',cls:'sel-ok'},
    {val:'off', label:'× 休み',  cls:'sel-off'},
    {val:'maybe',label:'△ 調整', cls:'sel-maybe'},
  ];
  const row=document.createElement('div');
  row.className='avail-btns';
  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='avail-btn'+(cur===b.val?' '+b.cls:'');
    btn.textContent=b.label;
    btn.onclick=(e)=>{e.stopPropagation();
      if(!reqStaffId){alert('先に名前を選択してください。');return;}
      if(reqAvailData[k]===b.val) delete reqAvailData[k];
      else reqAvailData[k]=b.val;
      render();
    };
    row.appendChild(btn);
  });
  wrap.appendChild(row);
  return wrap;
}

/* Staff view: read-only shift */
function staffShiftBlock(k,type,se,label){
  const bl=document.createElement('div');
  bl.className=`staff-shift-block ${type}`;
  const lbl=document.createElement('div');
  lbl.className='shift-label';lbl.textContent=label;bl.appendChild(lbl);
  const names=(se.names||[]).filter(n=>n&&n.trim());
  if(names.length){
    names.forEach(n=>{
      const t=document.createElement('span');
      t.className='name-tag';t.textContent=n;bl.appendChild(t);
    });
  } else {
    const e=document.createElement('span');e.className='name-empty';e.textContent='未定';bl.appendChild(e);
  }
  return bl;
}

/* ============================================================
   ADMIN EDIT MODAL
============================================================ */
let editKey=null,editType=null;
function openEdit(k,type){
  if(mode!=='admin') return;
  editKey=k;editType=type;
  const [ey,em,ed]=k.split('-').map(Number);
  const dow=new Date(ey,em-1,ed).getDay();
  document.getElementById('modalSub').textContent=`${ey}年${em}月${ed}日（${DOW_STR[dow]}）`;
  document.getElementById('modalHead').textContent=type==='lunch'?'☀ 昼の部（11:00〜14:00）':'🌙 夜の部（18:00〜21:00）';
  const entry=(shiftData[k]&&shiftData[k][type])||{names:[],ext:false};
  document.getElementById('extCheck').checked=entry.ext||false;
  const chips=document.getElementById('modalChips');
  chips.innerHTML='';
  staff.filter(s=>s.name.trim()).forEach(s=>{
    const lbl=document.createElement('label');
    const sel=(entry.names||[]).includes(s.name);
    lbl.className='staff-chip'+(sel?` selected-${type}`:'');
    const cb=document.createElement('input');
    cb.type='checkbox';cb.value=s.name;cb.checked=sel;
    cb.onchange=()=>lbl.className='staff-chip'+(cb.checked?` selected-${type}`:'');
    lbl.appendChild(cb);lbl.appendChild(document.createTextNode(s.name));
    chips.appendChild(lbl);
  });
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit(){document.getElementById('editOverlay').classList.remove('open');}
function saveShift(){
  const names=Array.from(document.querySelectorAll('#modalChips input:checked')).map(c=>c.value).slice(0,4);
  const ext=document.getElementById('extCheck').checked;
  if(!shiftData[editKey]) shiftData[editKey]={lunch:{names:[],ext:false},dinner:{names:[],ext:false}};
  shiftData[editKey][editType]={names,ext};
  saveShift2();closeEdit();render();
}

/* ============================================================
   REQUEST MODE: submit button in header
============================================================ */
function addSubmitBtn(){
  // remove if exists
  const old=document.getElementById('btnSubmitReq');
  if(old) old.remove();
  if(mode!=='request') return;
  const btn=document.createElement('button');
  btn.id='btnSubmitReq';btn.className='hbtn hbtn-amber no-print';
  btn.textContent='✔ 希望を送信';
  btn.onclick=openConfirm;
  document.querySelector('.header-right').insertBefore(btn, document.querySelector('.hbtn-green'));
}

/* ============================================================
   SUMMARY (admin)
============================================================ */
let summaryVisible=false;
function toggleSummary(){
  summaryVisible=!summaryVisible;
  if(summaryVisible) renderSummary();
  else hideSummary();
  document.getElementById('btnSummary').textContent=summaryVisible?'📅 カレンダーに戻る':'📊 希望一覧';
}
function hideSummary(){
  summaryVisible=false;
  document.getElementById('summaryWrap').style.display='none';
  document.getElementById('calWrap').style.display='';
  if(document.getElementById('btnSummary'))
    document.getElementById('btnSummary').textContent='📊 希望一覧';
}
function renderSummary(){
  document.getElementById('calWrap').style.display='none';
  const wrap=document.getElementById('summaryWrap');
  wrap.style.display='';
  wrap.innerHTML='';
  const avail=loadAvail(Y,M);
  const days=new Date(Y,M+1,0).getDate();
  const activeStaff=staff.filter(s=>s.name.trim());

  // Card per staff
  activeStaff.forEach(s=>{
    const sAvail=avail[s.id]||{};
    const entries=Object.entries(sAvail).sort(([a],[b])=>a.localeCompare(b));
    const card=document.createElement('div');
    card.className='summary-card';
    const head=document.createElement('div');
    head.className='summary-card-head';
    head.textContent=`${s.name}（${s.type==='part'?'パート':s.type==='fixed'?'固定':s.type==='free'?'フリー':'アルバイト'}）`;
    card.appendChild(head);
    if(entries.length===0){
      card.innerHTML+=`<p style="padding:14px 18px;font-size:.82em;color:#94a3b8;">希望未入力（全日出勤可として扱います）</p>`;
    } else {
      const table=document.createElement('table');
      table.className='summary-table';
      table.innerHTML=`<thead><tr><th>日付</th><th>曜日</th><th>希望</th></tr></thead>`;
      const tbody=document.createElement('tbody');
      entries.forEach(([k,v])=>{
        const [ky,km,kd]=k.split('-').map(Number);
        const dow=new Date(ky,km-1,kd).getDay();
        const tr=document.createElement('tr');
        const label=v==='ok'?'✅ 出勤可':v==='off'?'❌ 休み希望':'🔄 調整可';
        const cls=v==='ok'?'atag-ok':v==='off'?'atag-off':'atag-maybe';
        tr.innerHTML=`<td>${km}月${kd}日</td><td>${DOW_STR[dow]}</td><td><span class="atag ${cls}">${label}</span></td>`;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      card.appendChild(table);
    }
    wrap.appendChild(card);
  });
}

/* ============================================================
   STAFF MODAL
============================================================ */
const BADGE={part:['sb-part','パート'],fixed:['sb-fixed','固定'],free:['sb-free','フリー'],alt:['sb-alt','アルバイト']};
function openStaffModal(){
  const rows=document.getElementById('staffRows');
  rows.innerHTML='';
  staff.forEach(s=>{
    const [cls,lbl]=BADGE[s.type]||['',''];
    const row=document.createElement('div');
    row.className='srow';
    row.innerHTML=`<div class="srow-label"><span class="sbadge ${cls}">${lbl}</span></div>`;
    const inp=document.createElement('input');
    inp.type='text';inp.value=s.name;
    inp.placeholder=s.editable?'名前を入力':'（変更不可）';
    inp.disabled=!s.editable;inp.dataset.id=s.id;
    row.appendChild(inp);rows.appendChild(row);
  });
  document.getElementById('staffOverlay').classList.add('open');
}
function closeStaff(){document.getElementById('staffOverlay').classList.remove('open');}
function saveStaff(){
  document.querySelectorAll('#staffRows input').forEach(inp=>{
    const s=staff.find(x=>x.id===inp.dataset.id);
    if(s&&s.editable) s.name=inp.value.trim();
  });
  localStorage.setItem('pekin_staff',JSON.stringify(staff));
  closeStaff();render();
}

/* ============================================================
   NAV / RESET
============================================================ */
function changeMonth(d){
  M+=d;if(M>11){M=0;Y++;}if(M<0){M=11;Y--;}
  loadShift();
  if(mode==='request'){allAvail=loadAvail(Y,M);reqAvailData=reqStaffId?(allAvail[reqStaffId]||{}):{};setupReqMode();}
  if(mode==='admin') allAvail=loadAvail(Y,M);
  hideSummary();render();
}
function resetToDefault(){
  if(!confirm('この月のシフトをデフォルトに戻しますか？')) return;
  shiftData=buildDefault(Y,M);saveShift2();render();
}

/* close on backdrop */
['editOverlay','staffOverlay','confirmOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this) this.classList.remove('open');
  });
});
